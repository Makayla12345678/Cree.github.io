<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cree Dictionary & Constellations</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <div class="container">
            <h1>Cree Learning</h1>
            <p>Dictionary & Constellations</p>
            <nav>
                <button id="btn-dictionary" class="active">Dictionary</button>
                <button id="btn-constellations">Constellations</button>
                <button id="btn-history">History</button>
            </nav>
        </div>
    </header>

    <main class="container">

        <!-- Dictionary Section -->
        <section id="dictionary-section">
            <h2>Cree Dictionary</h2>
            <p class="subtitle">Explore 20 common words.</p>
            <div id="dictionary-grid" class="grid">
                <!-- Dictionary items will be loaded here via JS -->
            </div>
        </section>

        <!-- Constellations Section -->
        <section id="constellations-section" class="hidden">
            <h2>Cree Constellations</h2>
            <p class="subtitle">Discover 10 celestial bodies and constellations.</p>
            <div id="constellations-grid" class="grid">
                <!-- Constellation items will be loaded here via JS -->
            </div>
        </section>

        <!-- History Section -->
        <section id="history-section" class="hidden">
            <h2>Cree History</h2>
            <p class="subtitle">Learn about the rich history of the Swampy Cree people.</p>
            <div id="history-content">
                <p>Content coming soon...</p>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Cree Learning Project | By Seryna</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
